<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI競馬 予想アシスタント</title>
    <link rel="stylesheet" href="css/style_v3.css?v=13">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#0d1117">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        body {
            padding-top: 210px !important;
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Noto Sans JP', sans-serif;
        }
        @media (max-width: 480px) {
            body { padding-top: 300px !important; }
        }
        .glass-panel {
            background: rgba(13, 17, 23, 0.97) !important;
            backdrop-filter: blur(10px);
        }

        /* ── 馬評価カード ── */
        .role-card {
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1.5px solid;
        }
        .role-card.honmei  { border-color: #d4af37; background: rgba(212,175,55,0.08); }
        .role-card.taikou  { border-color: #58a6ff; background: rgba(88,166,255,0.07); }
        .role-card.ana     { border-color: #ff9800; background: rgba(255,152,0,0.07); }

        .role-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            font-weight: 900;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .role-label.honmei { background: #d4af37; color: #000; }
        .role-label.taikou { background: #58a6ff; color: #000; }
        .role-label.ana    { background: #ff9800; color: #000; }

        .horse-main-name {
            font-size: 1.3rem;
            font-weight: 900;
            color: #fff;
            margin: 0 0 4px;
        }
        .horse-sub-info {
            font-size: 0.72rem;
            color: #8b949e;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .score-bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .score-bar-label {
            font-size: 0.62rem;
            color: #8b949e;
            width: 28px;
            flex-shrink: 0;
        }
        .score-bar-track {
            flex: 1;
            height: 5px;
            background: #21262d;
            border-radius: 4px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .score-bar-val {
            font-size: 0.65rem;
            color: #ccc;
            width: 32px;
            text-align: right;
        }
        .reason-box {
            font-size: 0.72rem;
            color: #aaa;
            background: rgba(0,0,0,0.3);
            border-left: 3px solid;
            padding: 8px 10px;
            border-radius: 0 8px 8px 0;
            line-height: 1.6;
            margin-top: 8px;
        }
        .reason-box.honmei { border-color: #d4af37; }
        .reason-box.taikou { border-color: #58a6ff; }
        .reason-box.ana    { border-color: #ff9800; }

        /* ── スコアテーブル ── */
        .score-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
        .score-table th { padding: 8px 6px; color: #8b949e; background: #21262d; }
        .score-table td { padding: 8px 6px; border-bottom: 1px solid #21262d; text-align: center; }
        .score-table td:first-child { text-align: left; padding-left: 10px; }
    </style>
</head>

<body>
    <div class="app-container" style="max-width:600px; margin:0 auto; background:#161b22; min-height:100vh;">

        <!-- Header -->
        <header class="glass-panel"
            style="position:fixed; top:0; width:100%; max-width:600px; left:50%; transform:translateX(-50%); z-index:2000; border-bottom:3px solid #d4af37; padding-bottom:10px;">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 20px 8px;">
                <div style="font-size:0.6rem; color:#8b949e;">AI KEIBA</div>
                <h1 style="color:#d4af37; font-weight:900; font-size:1.05rem; margin:0;">
                    🐎 競馬予想AI
                    <span style="background:#ffeb3b; color:#000; padding:2px 8px; border-radius:20px; font-size:0.48rem; font-weight:900; vertical-align:middle;">V16</span>
                </h1>
                <div style="font-size:0.6rem; color:#8b949e;">v16</div>
            </div>

            <div style="padding:0 15px 10px;">
                <input type="text" id="netkeiba-url" placeholder="netkeibaの出馬表URLを入力..."
                    style="width:100%; box-sizing:border-box; background:rgba(0,0,0,0.5); border:1px solid #333; border-radius:8px; padding:12px; color:#fff; font-size:0.9rem; margin-bottom:10px;">
                <div style="display:flex; gap:10px;">
                    <button id="fetch-odds-btn"
                        style="flex:1; background:linear-gradient(135deg,#d4af37,#f0c040); color:#000; font-weight:900; border:none; padding:13px 0; border-radius:8px; cursor:pointer; font-size:1rem;">
                        解析スタート 🔍
                    </button>
                </div>
            </div>

            <div id="race-info-container" style="padding:0 20px 5px; text-align:center; font-size:0.8rem; color:#8b949e;"></div>
        </header>

        <!-- Status -->
        <section style="margin:15px; padding:12px 16px; background:linear-gradient(135deg,#161b22,#0d1117); border:1px solid rgba(212,175,55,0.2); border-radius:14px;">
            <p style="color:#d4af37; font-weight:900; margin:0 0 3px; font-size:0.85rem;">🧠 AI予想アシスタント</p>
            <p style="font-size:0.7rem; color:#8b949e; margin:0;">妙味・実力・DNA・穴スコアを総合評価し、本命・対抗・穴馬を判定します。</p>
            <div id="profile-status" style="margin-top:8px; font-size:0.68rem; color:#8b949e;"></div>
        </section>

        <!-- Results -->
        <section style="padding:0 15px;">
            <div id="results-container"></div>
        </section>

    </div>

    <!-- Service Workerの登録 (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered', reg))
                    .catch(e => console.error('SW failed', e));
            });
        }
    </script>
    <!-- V16 メインスクリプト -->
    <script src="js/app_v15.js?v=20260418b"></script>
</body>

</html>
