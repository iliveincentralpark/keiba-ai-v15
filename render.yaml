services:
  - type: web
    name: ai-keiba-v15
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker backend.main:app --bind 0.0.0.0:$PORT"
    healthCheckPath: "/api/status"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
